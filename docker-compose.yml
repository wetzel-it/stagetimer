services:
  stagetimer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stagetimer
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - stagetimer_data:/app/data
    environment:
      - TZ=Europe/Berlin
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
      - FLASK_ENV=production
      - LOG_LEVEL=INFO

volumes:
  stagetimer_data:
